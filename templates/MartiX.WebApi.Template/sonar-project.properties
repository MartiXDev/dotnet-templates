# quality-analysis.yml reads these defaults and passes them to SonarScanner for
# .NET during the begin step. Repository-specific keys, hosts, and tokens stay
# in GitHub variables and secrets.
sonar.sourceEncoding=UTF-8
sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=tests/**/*.cs
sonar.exclusions=**/bin/**,**/obj/**,.scaffold/**,.artifacts/**,bin/generated-assets/**
sonar.cs.vstest.reportsPaths=.artifacts/test-results/**/*.trx
sonar.cs.opencover.reportsPaths=.artifacts/test-results/**/coverage.opencover.xml
